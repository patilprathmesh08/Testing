name: STM32 Motor Controller CI Pipeline

on:
  push:
    branches:
      - main
      - MotorCode
  pull_request:
    branches:
      - main
      - MotorCode

jobs:
  # ─── JOB 1: BUILD FIRMWARE + SONAR BUILD WRAPPER ────────────────────────────
  build:
    name: Build STM32G431 Firmware
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Checkout the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2 - Install ARM GCC 14.3.1 (same as local VS Code)
      - name: Install ARM GCC Toolchain 14.3.1
        run: |
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/14.3.rel1/binrel/arm-gnu-toolchain-14.3.rel1-x86_64-arm-none-eabi.tar.xz
          tar xf arm-gnu-toolchain-14.3.rel1-x86_64-arm-none-eabi.tar.xz -C $HOME
          echo "$HOME/arm-gnu-toolchain-14.3.rel1-x86_64-arm-none-eabi/bin" >> $GITHUB_PATH
          rm arm-gnu-toolchain-14.3.rel1-x86_64-arm-none-eabi.tar.xz

      # Step 3 - Verify ARM GCC version
      - name: Verify ARM GCC Version
        run: arm-none-eabi-gcc --version

      # Step 4 - Install Ninja
      - name: Install Ninja
        run: sudo apt-get install -y ninja-build

      # Step 5 - Install CMake
      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.27'

      # Step 6 - Install Sonar Build Wrapper
      # Mandatory for C/C++ accurate SonarCloud analysis
      # Captures all compiler calls during build
      - name: Install Sonar Build Wrapper
        run: |
          wget -q https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
          unzip -q build-wrapper-linux-x86.zip
          echo "$PWD/build-wrapper-linux-x86" >> $GITHUB_PATH
          rm build-wrapper-linux-x86.zip

      # Step 7 - Verify Build Wrapper
      - name: Verify Build Wrapper
        run: build-wrapper-linux-x86-64 --version

      # Step 8 - Configure CMake Debug preset
      - name: Configure CMake (Debug)
        working-directory: CNR-Motor-Driver-1.0
        run: cmake --preset Debug

      # Step 9 - Build Debug firmware with Sonar Build Wrapper
      # Build Wrapper wraps the build to capture compiler calls
      - name: Build Debug Firmware with Build Wrapper
        working-directory: CNR-Motor-Driver-1.0
        run: |
          build-wrapper-linux-x86-64 \
            --out-dir build-wrapper-output \
            cmake --build --preset Debug

      # Step 10 - Configure CMake Release preset
      - name: Configure CMake (Release)
        working-directory: CNR-Motor-Driver-1.0
        run: cmake --preset Release

      # Step 11 - Build Release firmware
      - name: Build Release Firmware
        working-directory: CNR-Motor-Driver-1.0
        run: cmake --build --preset Release

      # Step 12 - Generate HEX and BIN files
      - name: Generate HEX and BIN Files
        working-directory: CNR-Motor-Driver-1.0
        run: |
          arm-none-eabi-objcopy -O ihex \
            $(find build/Release -name "*.elf" | head -1) \
            build/Release/firmware_release.hex
          arm-none-eabi-objcopy -O binary \
            $(find build/Release -name "*.elf" | head -1) \
            build/Release/firmware_release.bin
          echo "=== Generated Files ==="
          ls -la build/Release/*.hex build/Release/*.bin

      # Step 13 - Upload Release firmware artifacts
      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-release
          path: |
            CNR-Motor-Driver-1.0/build/Release/**/*.elf
            CNR-Motor-Driver-1.0/build/Release/*.hex
            CNR-Motor-Driver-1.0/build/Release/*.bin
          retention-days: 7

      # Step 14 - Upload Build Wrapper output for SonarCloud
      - name: Upload Build Wrapper Output
        uses: actions/upload-artifact@v4
        with:
          name: build-wrapper-output
          path: CNR-Motor-Driver-1.0/build-wrapper-output/
          retention-days: 1

  # ─── JOB 2: CODE QUALITY CHECKS ─────────────────────────────────────────────
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    needs: build  # Wait for build to complete first - needs build wrapper output

    steps:
      # Step 1 - Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2 - Install Doxygen
      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      # Step 3 - Download Build Wrapper output from build job
      - name: Download Build Wrapper Output
        uses: actions/download-artifact@v4
        with:
          name: build-wrapper-output
          path: CNR-Motor-Driver-1.0/build-wrapper-output/

      # ─── CHECK 1: HEADER AND COPYRIGHT NOTICE (WARNING ONLY) ────────────────
      - name: Check File Headers and Copyright Notice
        run: |
          echo "Checking copyright headers in Src/ and Inc/ only..."
          MISSING=0
          while IFS= read -r file; do
            if ! grep -q "Copyright\|copyright\|LICENSE\|license\|Author\|author\|SPDX" "$file"; then
              echo "WARNING - MISSING HEADER: $file"
              MISSING=$((MISSING + 1))
            fi
          done < <(find CNR-Motor-Driver-1.0/Src CNR-Motor-Driver-1.0/Inc -name "*.c" -o -name "*.h" 2>/dev/null)
          if [ "$MISSING" -gt 0 ]; then
            echo "WARNING: $MISSING file(s) missing copyright/header notice."
            echo "This is a warning only - build will continue."
          else
            echo "PASSED: All files have copyright/header notice."
          fi

      # ─── CHECK 2: DOXYGEN HTML DOCUMENTATION (WARNING ONLY) ─────────────────
      - name: Run Doxygen
        working-directory: CNR-Motor-Driver-1.0
        run: |
          echo "Running Doxygen..."
          doxygen Doxyfile 2>&1 | tee doxygen_output.log
          WARNINGS=$(grep -c "warning:" doxygen_output.log || true)
          echo "Doxygen Warnings: $WARNINGS"
          if [ "$WARNINGS" -gt 0 ]; then
            echo "WARNING: $WARNINGS Doxygen warning(s) found."
            echo "This is a warning only - build will continue."
          else
            echo "PASSED: No Doxygen warnings found."
          fi

      - name: Upload Doxygen HTML Documentation
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stm32-doxygen-docs
          path: CNR-Motor-Driver-1.0/docs/html/
          retention-days: 7

      # ─── CHECK 3: SONARCLOUD SCAN ────────────────────────────────────────────
      # Uses Build Wrapper output for accurate C code analysis
      # All config in sonar-project.properties
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: CNR-Motor-Driver-1.0
