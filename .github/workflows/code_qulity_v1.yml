name: STM32 Motor Controller CI Pipeline

on:
  push:
    branches:
      - main
      - MotorCode
  pull_request:
    branches:
      - main
      - MotorCode

jobs:
  # ─── JOB 1: BUILD FIRMWARE ──────────────────────────────────────────────────
  build:
    name: Build STM32G431 Firmware
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Checkout the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2 - Install ARM GNU Toolchain 14.3.rel1
      # Same version as local VS Code development
      - name: Install ARM GCC Toolchain 14.3.rel1
        run: |
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/14.3.rel1/binrel/arm-gnu-toolchain-14.3.rel1-x86_64-arm-none-eabi.tar.xz
          tar xf arm-gnu-toolchain-14.3.rel1-x86_64-arm-none-eabi.tar.xz -C $HOME
          echo "$HOME/arm-gnu-toolchain-14.3.rel1-x86_64-arm-none-eabi/bin" >> $GITHUB_PATH
      
      # Step 3 - Verify ARM GCC installation
      - name: Verify ARM GCC Version
        run: arm-none-eabi-gcc --version

      # Step 4 - Install Ninja build system
      - name: Install Ninja
        run: sudo apt-get install -y ninja-build

      # Step 5 - Verify Ninja installation
      - name: Verify Ninja Version
        run: ninja --version

      # Step 6 - Install CMake
      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.27'

      # Step 7 - Verify CMake installation
      - name: Verify CMake Version
        run: cmake --version

      # Step 8 - List repo structure to verify folder names
      - name: List Repo Structure
        run: ls -la

      # Step 9 - Configure CMake Debug preset
      - name: Configure CMake (Debug)
        working-directory: CNR-Motor-Driver-1.0
        run: cmake --preset Debug

      # Step 10 - Build Debug firmware
      - name: Build Debug Firmware
        working-directory: CNR-Motor-Driver-1.0
        run: cmake --build --preset Debug

      # Step 11 - Configure CMake Release preset
      - name: Configure CMake (Release)
        working-directory: CNR-Motor-Driver-1.0
        run: cmake --preset Release

      # Step 12 - Build Release firmware
      - name: Build Release Firmware
        working-directory: CNR-Motor-Driver-1.0
        run: cmake --build --preset Release

      # Step 13 - Generate HEX and BIN files from ELF
      - name: Generate HEX and BIN Files
        working-directory: CNR-Motor-Driver-1.0
        run: |
          # Debug hex and bin
          arm-none-eabi-objcopy -O ihex \
            $(find build/Debug -name "*.elf" | head -1) \
            build/Debug/firmware_debug.hex
          arm-none-eabi-objcopy -O binary \
            $(find build/Debug -name "*.elf" | head -1) \
            build/Debug/firmware_debug.bin

          # Release hex and bin
          arm-none-eabi-objcopy -O ihex \
            $(find build/Release -name "*.elf" | head -1) \
            build/Release/firmware_release.hex
          arm-none-eabi-objcopy -O binary \
            $(find build/Release -name "*.elf" | head -1) \
            build/Release/firmware_release.bin

          echo "=== Generated Files ==="
          ls -la build/Debug/*.hex build/Debug/*.bin
          ls -la build/Release/*.hex build/Release/*.bin

      # Step 14 - Upload Debug artifacts (elf, hex, bin)
      - name: Upload Debug Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-debug
          path: |
            CNR-Motor-Driver-1.0/build/Debug/**/*.elf
            CNR-Motor-Driver-1.0/build/Debug/*.hex
            CNR-Motor-Driver-1.0/build/Debug/*.bin
          retention-days: 7

      # Step 15 - Upload Release artifacts (elf, hex, bin)
      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-release
          path: |
            CNR-Motor-Driver-1.0/build/Release/**/*.elf
            CNR-Motor-Driver-1.0/build/Release/*.hex
            CNR-Motor-Driver-1.0/build/Release/*.bin
          retention-days: 7

  # ─── JOB 2: CODE QUALITY CHECKS ─────────────────────────────────────────────
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2 - Install Doxygen and Graphviz
      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      # ─── CHECK 1: HEADER AND COPYRIGHT NOTICE (WARNING ONLY) ────────────────
      # Only checks Src/ and Inc/ folders - skips Drivers/ and MCSDK/
      - name: Check File Headers and Copyright Notice
        run: |
          echo "Checking copyright headers in Src/ and Inc/ only..."
          MISSING=0
          while IFS= read -r file; do
            if ! grep -q "Copyright\|copyright\|LICENSE\|license\|Author\|author\|SPDX" "$file"; then
              echo "WARNING - MISSING HEADER: $file"
              MISSING=$((MISSING + 1))
            fi
          done < <(find CNR-Motor-Driver-1.0/Src CNR-Motor-Driver-1.0/Inc -name "*.c" -o -name "*.h" 2>/dev/null)
          if [ "$MISSING" -gt 0 ]; then
            echo "---"
            echo "WARNING: $MISSING file(s) in Src/ or Inc/ are missing copyright/header notice."
            echo "This is a warning only - build will continue."
          else
            echo "PASSED: All files in Src/ and Inc/ have copyright/header notice."
          fi

      # ─── CHECK 2: DOXYGEN DOCUMENTATION (HTML OUTPUT) ───────────────────────
      # Uses Doxyfile committed in repo
      # Generates full HTML documentation
      - name: Run Doxygen
        working-directory: CNR-Motor-Driver-1.0
        run: |
          echo "Running Doxygen..."
          doxygen Doxyfile 2>&1 | tee doxygen_output.log
          WARNINGS=$(grep -c "warning:" doxygen_output.log || true)
          echo "---"
          echo "Doxygen Warnings: $WARNINGS"
          if [ "$WARNINGS" -gt 0 ]; then
            echo "WARNING: $WARNINGS Doxygen warning(s) found - please review doxygen_output.log"
            echo "This is a warning only - build will continue."
          else
            echo "PASSED: No Doxygen warnings found."
          fi
          echo "=== HTML Documentation Generated ==="
          ls -la docs/html/ | head -20

      # Step - Upload Doxygen HTML documentation and log
      - name: Upload Doxygen Documentation
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stm32-doxygen-docs
          path: |
            CNR-Motor-Driver-1.0/doxygen_output.log
            CNR-Motor-Driver-1.0/docs/html/
          retention-days: 7

      # ─── CHECK 3: SONARCLOUD SCAN ────────────────────────────────────────────
      # All SonarCloud config moved to sonar-project.properties
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: CNR-Motor-Driver-1.0
