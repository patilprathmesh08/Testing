# ─── SonarCloud Project Configuration ───────────────────────────────────────
# Place this file INSIDE CNR-Motor-Driver-1.0/ folder
# Version: v2
# Date: 23-07-2026

# Organisation and project details
sonar.organization=patilprathmesh08
sonar.projectKey=patilprathmesh08_Testing
sonar.projectName=stmTesting
sonar.projectVersion=1.0

# Source code location - relative to CNR-Motor-Driver-1.0/
sonar.sources=Src
sonar.inclusions=**/*.c,**/*.h

# Language
sonar.language=c
sonar.c.file.suffixes=.c
sonar.h.file.suffixes=.h

# Encoding
sonar.sourceEncoding=UTF-8

# Exclude build output and third party folders
sonar.exclusions=**/build/**,**/MCSDK_v6.4.2-Full/**,**/Drivers/CMSIS/**

# Build Wrapper output - relative to CNR-Motor-Driver-1.0/
# Same job = same paths = correct analysis
sonar.cfamily.compile-commands=build-wrapper-output/compile_commands.json

# Quality gate - do not fail build if quality gate fails
sonar.qualitygate.wait=false

# Coverage report - add when unit tests are ready
# sonar.coverageReportPaths=coverage.info